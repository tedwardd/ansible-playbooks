---
- name: Mail Server Setup
  hosts: mail
  become: true
  vars:
    local_users:
      - userid: elw
        gh_id: tedwardd
        sudo: true
    fail2ban_exporter_enabled: true
    fail2ban_services:
      - name: sshd
        port: 22
        maxretry: 5
        bantime: 1h
      - name: postfix-sasl
        port: smtp,465,submission
        filter: postfix-sasl
        logpath: /var/log/maillog
        maxretry: 3
        bantime: 1h
    fail2ban_filterd_path: "{{ playbook_dir }}/files/fail2ban/filter.d/"
  pre_tasks:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Allow SSH before enabling UFW
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Enable UFW with default deny
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming
  roles:
    - role: linux_common
    - role: certbot
    - role: opendkim
    - role: postfix
    - role: dovecot
    - role: oefenweb.fail2ban
    - role: promtail
      vars:
        promtail_journal_units:
          - postfix
          - dovecot
