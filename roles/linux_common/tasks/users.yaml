- name: Create user
  ansible.builtin.user:
    name: elw
    create_home: yes
    shell: /bin/bash
    groups: sudo
    append: yes
    generate_ssh_key: yes
    ssh_key_type: ed25519
    ssh_key_file: .ssh/id_ed25519

- name: Set authorized_key
  ansible.posix.authorized_key:
    user: elw
    state: present
    key: https://github.com/tedwardd.keys

