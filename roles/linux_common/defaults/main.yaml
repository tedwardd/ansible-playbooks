---
ebpf_net_exporter_enabled: true
ebpf_net_exporter_version: "20260308.9"
ebpf_net_exporter_install_path: /usr/local/bin/ebpf-net-exporter
ebpf_net_exporter_addr: ":9102"

node_exporter_enabled: true
node_exporter_version: "1.9.0"
node_exporter_web_listen_address: "0.0.0.0:9100"

fail2ban_exporter_enabled: false
fail2ban_exporter_textfile_dir: /var/lib/node_exporter
fail2ban_exporter_interval: 60s
