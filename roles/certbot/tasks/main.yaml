---
- name: Install python3-requests (required by acme-dns-auth.py)
  ansible.builtin.apt:
    name: python3-requests
    state: present
    update_cache: false

- name: Deploy acme-dns-auth.py hook script
  ansible.builtin.template:
    src: acme-dns-auth.py.j2
    dest: "{{ certbot_acmedns_hook }}"
    owner: root
    group: root
    mode: "0755"

- name: Deploy acmedns.json credentials
  ansible.builtin.copy:
    content: "{{ certbot_acmedns_credentials | to_json }}\n"
    dest: "{{ certbot_acmedns_storage }}"
    owner: root
    group: root
    mode: "0600"

- name: Ensure renewal-hooks/deploy directory exists
  ansible.builtin.file:
    path: /etc/letsencrypt/renewal-hooks/deploy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy nginx reload hook (runs after every successful renewal)
  ansible.builtin.template:
    src: reload-nginx.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy cert-expiry textfile metric hook (runs after every successful renewal)
  ansible.builtin.template:
    src: cert-expiry-metric.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/cert-expiry-metric.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy cert-expiry-metric systemd service (daily refresh)
  ansible.builtin.template:
    src: cert-expiry-metric.service.j2
    dest: /etc/systemd/system/cert-expiry-metric.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Deploy cert-expiry-metric systemd timer (daily refresh)
  ansible.builtin.template:
    src: cert-expiry-metric.timer.j2
    dest: /etc/systemd/system/cert-expiry-metric.timer
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Flush handlers so systemd daemon-reload runs before timer start
  ansible.builtin.meta: flush_handlers

- name: Ensure certbot systemd timer is enabled and running
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started

- name: Ensure cert-expiry-metric timer is enabled and running
  ansible.builtin.systemd:
    name: cert-expiry-metric.timer
    enabled: true
    state: started
