---
- name: Install Dovecot
  ansible.builtin.apt:
    name:
      - dovecot-core
      - dovecot-imapd
      - dovecot-lmtpd
      - dovecot-sieve
      - dovecot-managesieved
    state: present
    update_cache: true

- name: Deploy 10-ssl.conf
  ansible.builtin.template:
    src: 10-ssl.conf.j2
    dest: /etc/dovecot/conf.d/10-ssl.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload dovecot

- name: Deploy 10-mail.conf
  ansible.builtin.template:
    src: 10-mail.conf.j2
    dest: /etc/dovecot/conf.d/10-mail.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload dovecot

- name: Deploy 10-auth.conf
  ansible.builtin.template:
    src: 10-auth.conf.j2
    dest: /etc/dovecot/conf.d/10-auth.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload dovecot

- name: Deploy 10-master.conf
  ansible.builtin.template:
    src: 10-master.conf.j2
    dest: /etc/dovecot/conf.d/10-master.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dovecot

- name: Deploy 20-managesieve.conf
  ansible.builtin.template:
    src: 20-managesieve.conf.j2
    dest: /etc/dovecot/conf.d/20-managesieve.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart dovecot

- name: Deploy 90-sieve.conf
  ansible.builtin.template:
    src: 90-sieve.conf.j2
    dest: /etc/dovecot/conf.d/90-sieve.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload dovecot

- name: Create sieve script directory
  ansible.builtin.file:
    path: /home/{{ item.userid }}/sieve
    state: directory
    owner: "{{ item.userid }}"
    group: "{{ item.userid }}"
    mode: "0700"
  loop: "{{ local_users }}"

- name: Deploy sieve script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/sieve/active.sieve"
    dest: "/home/{{ item.userid }}/sieve/active.sieve"
    owner: "{{ item.userid }}"
    group: "{{ item.userid }}"
    mode: "0600"
  loop: "{{ local_users }}"
  notify: Compile sieve script

- name: Activate sieve script
  ansible.builtin.file:
    src: "/home/{{ item.userid }}/sieve/active.sieve"
    dest: "/home/{{ item.userid }}/.dovecot.sieve"
    state: link
    owner: "{{ item.userid }}"
    group: "{{ item.userid }}"
  loop: "{{ local_users }}"

- name: Enable and start Dovecot
  ansible.builtin.systemd:
    name: dovecot
    enabled: true
    state: started

- name: Open IMAPS port in UFW
  community.general.ufw:
    rule: allow
    port: "993"
    proto: tcp

- name: Open ManageSieve port in UFW
  community.general.ufw:
    rule: allow
    port: "4190"
    proto: tcp
