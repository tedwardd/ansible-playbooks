---
# mail.xy0.org runs CentOS 7 (EOL) which only has Python 3.6 available.
# Ansible 2.20 requires Python 3.9+ on managed nodes. All tasks here use
# the `raw` module which communicates over SSH without a Python interpreter.
- name: External Server Setup
  hosts: external
  become: true
  gather_facts: false
  tasks:

    # ── Packages ──────────────────────────────────────────────────────────────
    - name: Install common packages
      ansible.builtin.raw: yum install -y curl jq unzip tmux
      changed_when: false

    # ── User setup ────────────────────────────────────────────────────────────
    - name: Create elw user
      ansible.builtin.raw: id elw || useradd -m -s /bin/bash elw
      changed_when: false

    - name: Add elw to wheel group
      ansible.builtin.raw: usermod -aG wheel elw
      changed_when: false

    - name: Create .ssh directory for elw
      ansible.builtin.raw: mkdir -p /home/elw/.ssh && chmod 700 /home/elw/.ssh && chown elw:elw /home/elw/.ssh
      changed_when: false

    - name: Set authorized key for elw from GitHub
      ansible.builtin.raw: |
        curl -sf https://github.com/tedwardd.keys > /home/elw/.ssh/authorized_keys
        chmod 600 /home/elw/.ssh/authorized_keys
        chown elw:elw /home/elw/.ssh/authorized_keys
      changed_when: false

    # ── Blackbox Exporter ─────────────────────────────────────────────────────
    - name: Create blackbox_exporter system user
      ansible.builtin.raw: id blackbox_exporter || useradd --no-create-home --shell /bin/false blackbox_exporter
      changed_when: false

    - name: Download blackbox_exporter
      ansible.builtin.raw: |
        if [ ! -f /usr/local/bin/blackbox_exporter ]; then
          curl -sfL https://github.com/prometheus/blackbox_exporter/releases/download/v0.25.0/blackbox_exporter-0.25.0.linux-amd64.tar.gz \
            | tar -xzf - -C /tmp/
          cp /tmp/blackbox_exporter-0.25.0.linux-amd64/blackbox_exporter /usr/local/bin/
          chmod 755 /usr/local/bin/blackbox_exporter
        fi
      changed_when: false

    - name: Create blackbox_exporter config directory
      ansible.builtin.raw: mkdir -p /etc/blackbox_exporter
      changed_when: false

    - name: Write blackbox_exporter config
      ansible.builtin.raw: |
        cat > /etc/blackbox_exporter/config.yml << 'EOF'
        modules:
          http_2xx:
            prober: http
            timeout: 10s
            http:
              valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
              valid_status_codes: []
              follow_redirects: true
              preferred_ip_protocol: "ip4"
        EOF
      changed_when: false

    - name: Write blackbox_exporter systemd unit
      ansible.builtin.raw: |
        cat > /etc/systemd/system/blackbox_exporter.service << 'EOF'
        [Unit]
        Description=Blackbox Exporter
        After=network-online.target
        Wants=network-online.target

        [Service]
        User=blackbox_exporter
        Group=blackbox_exporter
        Type=simple
        ExecStart=/usr/local/bin/blackbox_exporter --config.file=/etc/blackbox_exporter/config.yml
        Restart=on-failure

        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl daemon-reload
      changed_when: false

    - name: Enable and start blackbox_exporter
      ansible.builtin.raw: |
        systemctl enable blackbox_exporter
        systemctl start blackbox_exporter || systemctl restart blackbox_exporter
      changed_when: false

    # ── Node Exporter ────────────────────────────────────────────────────────
    - name: Create node_exporter system user
      ansible.builtin.raw: id node_exporter || useradd --no-create-home --shell /bin/false node_exporter
      changed_when: false

    - name: Download node_exporter
      ansible.builtin.raw: |
        if [ ! -f /usr/local/bin/node_exporter ]; then
          curl -sfL https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz \
            | tar -xzf - -C /tmp/
          cp /tmp/node_exporter-1.8.2.linux-amd64/node_exporter /usr/local/bin/
          chmod 755 /usr/local/bin/node_exporter
        fi
      changed_when: false

    - name: Write node_exporter systemd unit
      ansible.builtin.raw: |
        cat > /etc/systemd/system/node_exporter.service << 'EOF'
        [Unit]
        Description=Node Exporter
        After=network-online.target
        Wants=network-online.target

        [Service]
        User=node_exporter
        Group=node_exporter
        Type=simple
        ExecStart=/usr/local/bin/node_exporter
        Restart=on-failure

        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl daemon-reload
      changed_when: false

    - name: Enable and start node_exporter
      ansible.builtin.raw: |
        systemctl enable node_exporter
        systemctl start node_exporter || systemctl restart node_exporter
      changed_when: false

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: Allow blackbox_exporter from Tailscale network only
      ansible.builtin.raw: |
        firewall-cmd --permanent --query-rich-rule='rule family="ipv4" source address="100.64.0.0/10" port port="9115" protocol="tcp" accept' 2>/dev/null \
          || firewall-cmd --permanent --add-rich-rule='rule family="ipv4" source address="100.64.0.0/10" port port="9115" protocol="tcp" accept'
        firewall-cmd --reload
      changed_when: false

    - name: Allow node_exporter from Tailscale network only
      ansible.builtin.raw: |
        firewall-cmd --permanent --query-rich-rule='rule family="ipv4" source address="100.64.0.0/10" port port="9100" protocol="tcp" accept' 2>/dev/null \
          || firewall-cmd --permanent --add-rich-rule='rule family="ipv4" source address="100.64.0.0/10" port port="9100" protocol="tcp" accept'
        firewall-cmd --reload
      changed_when: false

    - name: Allow ManageSieve from Tailscale network only
      ansible.builtin.raw: |
        firewall-cmd --permanent --query-rich-rule='rule family="ipv4" source address="100.64.0.0/10" port port="4190" protocol="tcp" accept' 2>/dev/null \
          || firewall-cmd --permanent --add-rich-rule='rule family="ipv4" source address="100.64.0.0/10" port port="4190" protocol="tcp" accept'
        firewall-cmd --reload
      changed_when: false

    # ── GeoIP ASN Database ─────────────────────────────────────────────────
    - name: Create GeoIP directory
      ansible.builtin.raw: mkdir -p /usr/share/GeoIP
      changed_when: false

    - name: Download GeoLite2-ASN database
      ansible.builtin.raw: |
        curl -sfL "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-ASN&license_key={{ maxmind_license_key }}&suffix=tar.gz" \
          -o /tmp/GeoLite2-ASN.tar.gz
        tar -xzf /tmp/GeoLite2-ASN.tar.gz -C /tmp/
        cp /tmp/GeoLite2-ASN_*/GeoLite2-ASN.mmdb /usr/share/GeoIP/GeoLite2-ASN.mmdb
        rm -rf /tmp/GeoLite2-ASN*
      changed_when: false
      when: maxmind_license_key is defined and maxmind_license_key | length > 0

    # ── Promtail ─────────────────────────────────────────────────────────────
    - name: Create promtail system user
      ansible.builtin.raw: id promtail || useradd --no-create-home --shell /bin/false promtail
      changed_when: false

    - name: Add promtail to systemd-journal group
      ansible.builtin.raw: usermod -aG systemd-journal promtail
      changed_when: false

    - name: Download and install promtail
      ansible.builtin.raw: |
        if [ ! -f /usr/local/bin/promtail ] || ! /usr/local/bin/promtail --version 2>&1 | grep -q '3.4.2'; then
          curl -sfL https://github.com/grafana/loki/releases/download/v3.4.2/promtail-linux-amd64.zip -o /tmp/promtail.zip
          cd /tmp && unzip -o promtail.zip
          cp /tmp/promtail-linux-amd64 /usr/local/bin/promtail
          chmod 755 /usr/local/bin/promtail
          rm -f /tmp/promtail.zip /tmp/promtail-linux-amd64
        fi
      changed_when: false

    - name: Create promtail config directory
      ansible.builtin.raw: mkdir -p /etc/promtail
      changed_when: false

    - name: Create promtail state directory
      ansible.builtin.raw: mkdir -p /var/lib/promtail && chown promtail:promtail /var/lib/promtail
      changed_when: false

    - name: Write promtail config
      ansible.builtin.raw: |
        cat > /etc/promtail/config.yml << 'EOF'
        server:
          http_listen_port: 9080
          grpc_listen_port: 0

        positions:
          filename: /var/lib/promtail/positions.yaml

        clients:
          - url: https://loki.tail167587.ts.net/loki/api/v1/push

        scrape_configs:
          - job_name: journal
            journal:
              max_age: 12h
              labels:
                job: systemd-journal
                host: mail
            relabel_configs:
              - source_labels: ['__journal__systemd_unit']
                target_label: unit
              - source_labels: ['__journal_priority_keyword']
                target_label: level
              - source_labels: ['__journal__systemd_unit']
                regex: 'postfix.service|dovecot.service'
                action: keep
            pipeline_stages:
              # Extract IPs from dovecot (rip=x.x.x.x) and postfix (unknown[x.x.x.x])
              - regex:
                  expression: 'rip=(?P<remote_ip>\d+\.\d+\.\d+\.\d+)'
              - regex:
                  expression: 'unknown\[(?P<remote_ip>\d+\.\d+\.\d+\.\d+)\]'
              - geoip:
                  db: /usr/share/GeoIP/GeoLite2-ASN.mmdb
                  source: remote_ip
                  db_type: asn
              - labels:
                  geoip_autonomous_system_number:
                  geoip_autonomous_system_organization:
        EOF
      changed_when: false

    - name: Write promtail systemd unit
      ansible.builtin.raw: |
        cat > /etc/systemd/system/promtail.service << 'EOF'
        [Unit]
        Description=Promtail Log Collector
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        User=promtail
        Group=promtail
        ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/config.yml
        Restart=on-failure
        RestartSec=5s

        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl daemon-reload
      changed_when: false

    - name: Enable and start promtail
      ansible.builtin.raw: |
        systemctl enable promtail
        systemctl start promtail || systemctl restart promtail
      changed_when: false

    # ── Dovecot Sieve ─────────────────────────────────────────────────────────
    - name: Install dovecot-pigeonhole
      ansible.builtin.raw: yum install -y dovecot-pigeonhole
      changed_when: false

    - name: Write 90-sieve.conf
      ansible.builtin.raw: |
        cat > /etc/dovecot/conf.d/90-sieve.conf << 'EOF'
        # Managed by Ansible — do not edit manually
        plugin {
          sieve = ~/.dovecot.sieve
          sieve_dir = ~/sieve
          sieve_max_script_size = 1M
          sieve_quota_max_scripts = 0
          sieve_quota_max_storage = 0
        }

        protocol lmtp {
          mail_plugins = $mail_plugins sieve
        }

        protocol lda {
          mail_plugins = $mail_plugins sieve
        }
        EOF
      changed_when: false

    - name: Write 20-managesieve.conf
      ansible.builtin.raw: |
        cat > /etc/dovecot/conf.d/20-managesieve.conf << 'EOF'
        # Managed by Ansible — do not edit manually
        protocols = $protocols sieve

        protocol sieve {
          managesieve_max_line_length = 65536
          managesieve_implementation_string = Dovecot Pigeonhole
          managesieve_max_compile_errors = 5
        }
        EOF
      changed_when: false

    - name: Write 10-master.conf with LMTP socket for Postfix
      ansible.builtin.raw: |
        cat > /etc/dovecot/conf.d/10-master.conf << 'EOF'
        # Managed by Ansible — do not edit manually

        service imap-login {
          inet_listener imap {
            #port = 143
          }
          inet_listener imaps {
            #port = 993
            #ssl = yes
          }
          service_count = 0
          vsz_limit = 256M
        }

        service imap {
          vsz_limit = 1024M
          process_limit = 2048
        }

        service lmtp {
          unix_listener /var/spool/postfix/private/dovecot-lmtp {
            mode = 0600
            user = postfix
            group = postfix
          }
        }

        service auth {
          unix_listener /var/spool/postfix/private/auth {
            mode = 0660
            user = postfix
            group = postfix
          }
        }

        service auth-worker {
        }

        service managesieve-login {
          inet_listener sieve {
            port = 4190
          }
        }

        service managesieve {
          process_limit = 1024
        }

        service dict {
          unix_listener dict {
            #mode = 0600
          }
        }
        EOF
      changed_when: false

    - name: Switch Postfix delivery from Procmail to Dovecot LDA
      ansible.builtin.raw: |
        python << 'PYEOF'
        import re
        with open('/etc/postfix/main.cf', 'r') as f:
            content = f.read()
        content = re.sub(r'^(mailbox_command|virtual_transport|home_mailbox).*\n', '', content, flags=re.MULTILINE)
        if 'dovecot-lda' not in content:
            content += 'mailbox_command = /usr/libexec/dovecot/dovecot-lda -f "$SENDER" -a "$RECIPIENT"\n'
        with open('/etc/postfix/main.cf', 'w') as f:
            f.write(content)
        PYEOF
      changed_when: false

    - name: Restart Dovecot to load Sieve and ManageSieve
      ansible.builtin.raw: systemctl restart dovecot
      changed_when: false

    - name: Reload Postfix to apply Dovecot LDA
      ansible.builtin.raw: systemctl reload postfix
      changed_when: false

    # ── Sieve script ──────────────────────────────────────────────────────────
    - name: Create sieve script directory
      ansible.builtin.raw: mkdir -p /home/elw/sieve && chown elw:elw /home/elw/sieve
      changed_when: false

    - name: Deploy active sieve script
      ansible.builtin.raw: |
        cat > /home/elw/sieve/active.sieve << 'SIEVEEOF'
        require ["fileinto", "mailbox"];

        # ── FreeBSD ───────────────────────────────────────────────────────────────────
        # More specific subfolders must come before the parent catch-all.

        if header :contains "List-Id" "freebsd-current" {
            fileinto :create "INBOX.Mailing Lists.FreeBSD.CURRENT";
            stop;
        }

        if header :contains "List-Id" "freebsd-usb" {
            fileinto :create "INBOX.Mailing Lists.FreeBSD.USB";
            stop;
        }

        if anyof (
            header :contains "List-Id" "freebsd-announce",
            header :contains "Subject" "[FreeBSD-Announce]"
        ) {
            fileinto :create "INBOX.Mailing Lists.FreeBSD.Announce";
            stop;
        }

        if anyof (
            header :contains "From" "security-advisories@freebsd.org",
            header :contains "Subject" "[FreeBSD-Security]"
        ) {
            fileinto :create "INBOX.Mailing Lists.FreeBSD.Security";
            stop;
        }

        if anyof (
            header :contains "From" "errata-notices@freebsd.org",
            header :contains "Subject" "[FreeBSD-Errata]"
        ) {
            fileinto :create "INBOX.Mailing Lists.FreeBSD.Errata";
            stop;
        }

        # Catch-all for remaining FreeBSD list mail
        if anyof (
            header :contains "List-Id" "freebsd",
            header :contains "From" "mailman-owner@freebsd.org",
            header :contains "Subject" "[FreeBSD]"
        ) {
            fileinto :create "INBOX.Mailing Lists.FreeBSD";
            stop;
        }

        # ── Fedora ────────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "devel.lists.fedoraproject.org",
            header :contains "Subject" "[Fedora-devel]"
        ) {
            fileinto :create "INBOX.Mailing Lists.Fedora.Devel";
            stop;
        }

        if anyof (
            header :contains "List-Id" "server.lists.fedoraproject.org",
            header :contains "Subject" "[Fedora-server]"
        ) {
            fileinto :create "INBOX.Mailing Lists.Fedora.Server";
            stop;
        }

        # ── OpenBSD ───────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "announce.openbsd.org",
            header :contains "Subject" "[OpenBSD-Announce]"
        ) {
            fileinto :create "INBOX.Mailing Lists.OpenBSD.Announce";
            stop;
        }

        if anyof (
            header :contains "List-Id" "misc.openbsd.org",
            header :contains "Subject" "[OpenBSD-Misc]"
        ) {
            fileinto :create "INBOX.Mailing Lists.OpenBSD.Misc";
            stop;
        }

        # ── Slackware ─────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "From" "slackware-security@slackware.com",
            header :contains "Sender" "owner-slackware-security@slackware.com",
            header :contains "Subject" "[slackware-security]"
        ) {
            fileinto :create "INBOX.Mailing Lists.Slackware.Security";
            stop;
        }

        # Catch-all for remaining Slackware mail
        if anyof (
            header :contains "From" "@slackware.com",
            header :contains "Sender" "owner-slackware",
            header :contains "Subject" "[slackware-"
        ) {
            fileinto :create "INBOX.Mailing Lists.Slackware";
            stop;
        }

        # ── TOR ───────────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "tor-announce.lists.torproject.org",
            header :contains "Subject" "[Tor-announce]"
        ) {
            fileinto :create "INBOX.Mailing Lists.TOR.Announce";
            stop;
        }

        # Catch-all for remaining TOR list mail
        if anyof (
            header :contains "List-Id" "lists.torproject.org",
            header :contains "Subject" "[Tor-"
        ) {
            fileinto :create "INBOX.Mailing Lists.TOR";
            stop;
        }

        # ── Docker ────────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "docker-dev.googlegroups.com",
            header :contains "From" "docker-dev@googlegroups.com",
            header :contains "Subject" "[docker-dev]"
        ) {
            fileinto :create "INBOX.Mailing Lists.Docker.Dev";
            stop;
        }

        # ── CVEs / Security Advisories ────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "oss-security.lists.openwall.com",
            header :contains "From" "oss-security@lists.openwall.com"
        ) {
            fileinto :create "INBOX.Mailing Lists.CVEs";
            stop;
        }

        # ── VIM ───────────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "Sender" "vim_use@googlegroups.com",
            header :contains "From" "vim@vim.org"
        ) {
            fileinto :create "INBOX.Mailing Lists.VIM";
            stop;
        }

        # ── DC404 ─────────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "kaos.to",
            header :contains "From" "@lists.kaos.to"
        ) {
            fileinto :create "INBOX.Mailing Lists.DC404";
            stop;
        }

        # ── ALE ───────────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "ale.org",
            header :contains "From" "@ale.org",
            header :contains "Subject" "[ale]"
        ) {
            fileinto :create "INBOX.Mailing Lists.ALE";
            stop;
        }

        # ── Archlinux ─────────────────────────────────────────────────────────────────

        if header :contains "List-Id" "lists.archlinux.org" {
            fileinto :create "INBOX.Mailing Lists.Archlinux";
            stop;
        }

        # ── Cypherpunks ───────────────────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "cypherpunks.lists.cpunks.org",
            header :contains "From" "@cpunks.org"
        ) {
            fileinto :create "INBOX.Mailing Lists.Cpunks";
            stop;
        }

        # ── Cryptography (Randombit) ──────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "cryptography.randombit.net",
            header :contains "From" "cryptography@randombit.net"
        ) {
            fileinto :create "INBOX.Mailing Lists.Cryptography(Randombit)";
            stop;
        }

        # ── Radio ─────────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "List-Id" "vhfcontesting.contesting.com",
            header :contains "Subject" "[VHFcontesting]"
        ) {
            fileinto :create "INBOX.Radio.VHF Contesting";
            stop;
        }

        if anyof (
            header :contains "List-Id" "QRPLabs.groups.io",
            header :contains "Subject" "[QRPLabs]"
        ) {
            fileinto :create "INBOX.Radio.QRPLabs";
            stop;
        }

        if anyof (
            header :contains "List-Id" "wsjtx.groups.io",
            header :contains "Subject" "[WSJTX]"
        ) {
            fileinto :create "INBOX.Radio.WSJTX";
            stop;
        }

        if anyof (
            header :contains "List-Id" "ninotnc.groups.io",
            header :contains "Subject" "[NinoTNC]"
        ) {
            fileinto :create "INBOX.Radio.NinoTNC";
            stop;
        }

        if anyof (
            header :contains "List-Id" "fourlanders.contesting.com",
            header :contains "Subject" "[Fourlanders]"
        ) {
            fileinto :create "INBOX.Radio.FourLanders";
            stop;
        }

        # ── CryptoGram ────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "From" "schneier@schneier.com",
            header :contains "Subject" "CRYPTO-GRAM"
        ) {
            fileinto :create "INBOX.cryptogram";
            stop;
        }

        # ── FSF ───────────────────────────────────────────────────────────────────────

        if header :contains "From" "info@fsf.org" {
            fileinto :create "INBOX.fsf";
            stop;
        }

        # ── GitHub ────────────────────────────────────────────────────────────────────

        if anyof (
            header :contains "From" "noreply@github.com",
            header :contains "Subject" "[GitHub]"
        ) {
            fileinto :create "INBOX.github";
            stop;
        }
        SIEVEEOF
        chown elw:elw /home/elw/sieve/active.sieve
      changed_when: false

    - name: Compile and activate sieve script
      ansible.builtin.raw: |
        sievec /home/elw/sieve/active.sieve
        ln -sf /home/elw/sieve/active.sieve /home/elw/.dovecot.sieve
        chown -h elw:elw /home/elw/.dovecot.sieve
      changed_when: false
