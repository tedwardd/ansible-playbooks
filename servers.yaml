---
- name: Jumpstar Setup
  hosts: jumpstar
  become: true
  vars:
    ebpf_net_exporter_enabled: false
    fail2ban_exporter_enabled: true
    local_users:
      - userid: elw
        gh_id: tedwardd
        sudo: true
    fail2ban_services:
      - name: sshd
        port: 22
        maxretry: 5
        bantime: 1h
        bantime_increment: true
        bantime_factor: 2
        backend: systemd
        journalmatch: _SYSTEMD_UNIT=ssh.service _COMM=sshd
      - name: nginx-http-auth
        port: http,https
        logpath: /var/log/nginx/error.log
        maxretry: 5
      - name: nginx-botsearch
        port: http,https
        logpath: /var/log/nginx/access.log
        maxretry: 2
      - name: nginx-bad-request
        port: http,https
        logpath: /var/log/nginx/access.log
        maxretry: 5
      - name: recidive
        logpath: /var/log/fail2ban.log
        bantime: 1w
        findtime: 1d
        maxretry: 5
    # nginx proxy locations — add new services here
    nginx_proxy_locations:
      - path: /miniflux
        backend: 192.168.1.58   # Traefik on jupiter
    nginx_remove_default_vhost: true
    nginx_vhosts:
      - server_name: techmachine.net
        template: "{{ playbook_dir }}/templates/jumpstar-vhost.j2"
        filename: "techmachine.net.conf"
        state: present
  roles:
    - role: linux_common
    - role: oefenweb.fail2ban
    - role: promtail
      vars:
        promtail_scrape_nginx: true
        promtail_scrape_fail2ban: true
    - role: geerlingguy.nginx
  tasks:
    - name: Remove legacy 'root' nginx vhost from sites-enabled
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/root
        state: absent
      notify: reload nginx

    - name: Deploy SSL cert snippet
      ansible.builtin.copy:
        content: |
          ssl_certificate /etc/nginx/certs/fullchain.pem;
          ssl_certificate_key /etc/nginx/certs/privkey.pem;
        dest: /etc/nginx/snippets/certs.conf
        owner: root
        group: root
        mode: "0644"
      notify: reload nginx
- name: MiniStar Configs
  hosts: ministar
  vars:
    ebpf_net_exporter_enabled: false
    local_users:
      - userid: elw
        gh_id: tedwardd
        sudo: true
  roles:
    - role: linux_common
- name: Jupiter Setup
  hosts: jupiter
  become: true
  vars:
    local_users:
      - userid: elw
        gh_id: tedwardd
        sudo: true
  roles:
    - role: docker
    - role: linux_common
    - role: virt_host
    - role: prometheus.prometheus.prometheus
    - role: cf_dns_discovery
      vars:
        cf_dns_discovery_zone: "techmachine.net"
    - role: cf_dns_discovery
      vars:
        cf_dns_discovery_zone: "platfrastructure.life"
    - role: cf_dns_discovery
      vars:
        cf_dns_discovery_zone: "pleopods.com"
  tasks:
    - name: Make zpool
      zpool:
        name: tank
        devices:
          - sdc
          - sdd
          - sde
          - sdf
          - sdg
          - sdh
          - sdi
        raid_level: raidz2
        vdev: 7
        state: present
    - name: Create ZFS Filesystems
      community.general.zfs:
        name: 'tank/rvn'
        state: present
        extra_zfs_properties:
          quota: "214748364800" # Must be defined in bytes
