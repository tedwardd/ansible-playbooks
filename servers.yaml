---
- name: Jumpstar Setup
  hosts: jumpstar
  become: true
  vars:
    local_users:
      - userid: elw
        gh_id: tedwardd
        sudo: true
    fail2ban_services:
      - name: sshd
        port: 2223
        maxretry: 5
        bantime: 1h
        bantime_increment: true
        bantime_factor: 2
        backend: systemd
  roles:
    - role: linux_common
    - role: oefenweb.fail2ban
- name: Jupiter Setup
  hosts: jupiter
  become: true
  vars:
    local_users:
      - userid: elw
        gh_id: tedwardd
        sudo: true
  roles:
    - role: docker
    - role: linux_common
    - role: virt_host
  tasks:
    - name: Create plotter temp storage
      block:
        - name: Create plotter partition
          community.general.parted:
            device: /dev/sdj
            number: 1
            state: present
            fs_type: xfs
        - name: Create plotter temp fs
          community.general.filesystem:
            fstype: xfs
            dev: /dev/sdj1
            state: present
        - name: Create plotter-tmp path
          ansible.builtin.file:
            path: /mnt/plotter-temp
            state: directory
            owner: elw
            group: elw
            mode: '0755'
        - name: Mount plotter temp
          ansible.posix.mount:
            path: /mnt/plotter-temp
            src: /dev/sdj1
            fstype: xfs
            state: mounted
    - name: Make zpool
      zpool:
        name: tank
        devices:
          - sdc
          - sdd
          - sde
          - sdf
          - sdg
          - sdh
          - sdi
        raid_level: raidz2
        vdev: 7
        state: present
    - name: Create ZFS Filesystems
      community.general.zfs:
        name: 'tank/rvn'
        state: present
        extra_zfs_properties:
          quota: "214748364800" # Must be defined in bytes
